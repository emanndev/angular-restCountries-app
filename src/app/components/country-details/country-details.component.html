<div>
  <button (click)="goBack()">Back</button>
  <div *ngIf="loading$ | async">Loading...</div>
  <div *ngIf="error$ | async as error">{{ error }}</div>
  <div *ngIf="country$ | async as country">
    <h2>{{ country.name }}</h2>
    <img [src]="country.flags.png" [alt]="country.flags.alt" width="100" />
    <p>Capital: {{ country.capital.join(", ") }}</p>
    <p>Region: {{ country.region }}</p>
    <p>Population: {{ country.population }}</p>
    <p *ngIf="country.borders.length">
      Borders:
      <span *ngFor="let border of country.borders">
        <a (click)="selectBorderCountry(border)">{{ border }}</a>
      </span>
    </p>
  </div>
</div>
