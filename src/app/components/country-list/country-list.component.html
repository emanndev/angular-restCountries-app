<div>
  <input
    type="text"
    [(ngModel)]="searchQuery"
    (input)="onSearch()"
    placeholder="Search for a country..."
  />
  <select [(ngModel)]="filterRegion" (change)="onFilterRegion(filterRegion)">
    <option value="">All Regions</option>
    <option *ngFor="let region of regions" [value]="region">
      {{ region }}
    </option>
  </select>
  <div *ngIf="loading$ | async">Loading...</div>
  <div *ngIf="error$ | async as error">{{ error }}</div>
  <ul>
    @for( country of countries$ | async; track $index) {
    <li (click)="selectCountry(country)">
      <img [src]="country.flags.png" [alt]="country.flags.alt" width="50" />
      {{ country.name.common }} ({{ country.region }}) - Population:
      {{ country.population | population }}
    </li>
    }
  </ul>
</div>
